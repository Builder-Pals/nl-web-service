name: Deploy release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy
        required: true
        type: string
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          SSH_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
        run: |
          install -m 700 -d ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key

          printf '%s\n' "$SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy release to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}
        run: |
          ssh \
            -i ~/.ssh/vps_deploy_key \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "bash -s -- '$RELEASE_TAG'" <<'REMOTE'
          set -euo pipefail

          RELEASE_TAG="$1"
          APP_DIR="/opt/native-web-service"

          cd "$APP_DIR"

          git fetch --force origin tag "$RELEASE_TAG"

          # Refuse to deploy with uncommitted server-side changes.
          git diff --quiet
          git diff --cached --quiet

          git checkout --detach "$RELEASE_TAG"

          export RELEASE_TAG
          docker compose build --pull app
          docker compose up -d --remove-orphans --wait --wait-timeout 60

          docker image prune -f

          echo "Successfully deployed $RELEASE_TAG"
          REMOTE
